name: Career Ops Smoke

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install backend dependencies
        run: python -m pip install -e "./backend[dev]"

      - name: Install frontend dependencies
        run: python -m pip install -r frontend/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run Career Ops smoke and regression checks
        run: python scripts/run_career_ops_ci.py
